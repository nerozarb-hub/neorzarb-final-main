  <rect x="2" y="2" width="8" height="2" fill="#3F6A24"/>
  <rect x="2" y="2" width="2" height="8" fill="#3F6A24"/>
  <!-- Green accent lines (bottom-right bracket) -->
  <rect x="22" y="28" width="8" height="2" fill="#3F6A24"/>
  <rect x="28" y="22" width="2" height="8" fill="#3F6A24"/>
